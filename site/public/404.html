<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>agent-ui</title>
    <script>
      // GH Pages SPA fallback — encodes the deep path into the query string
      // and bounces to /agent-feedback-ui/, where index.html decodes it back.
      // Pattern from rafgraph/spa-github-pages.
      var pathSegmentsToKeep = 1; // /agent-feedback-ui/...
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
